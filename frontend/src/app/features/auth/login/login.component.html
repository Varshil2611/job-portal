<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full">

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center mx-auto mb-4">
        <span class="text-white font-bold text-lg">JP</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Welcome back</h1>
      <p class="text-gray-500 mt-1 text-sm">Sign in to your account</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">

      <!-- Error -->
      @if (error) {
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2">
          <svg class="w-4 h-4 text-red-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"/>
          </svg>
          <span class="text-red-700 text-sm">{{ error }}</span>
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Email address</label>
          <input type="email" formControlName="email" placeholder="you@example.com"
            class="w-full px-4 py-2.5 border rounded-lg text-sm outline-none transition-colors
              focus:border-blue-500 focus:ring-2 focus:ring-blue-100
              placeholder-gray-400 text-gray-900"
            [class.border-red-400]="email?.invalid && email?.touched"
            [class.border-gray-300]="!(email?.invalid && email?.touched)"/>
          @if (email?.invalid && email?.touched) {
            <p class="text-red-500 text-xs mt-1">Please enter a valid email</p>
          }
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
          <div class="relative">
            <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
              placeholder="••••••••"
              class="w-full px-4 py-2.5 border rounded-lg text-sm outline-none transition-colors
                focus:border-blue-500 focus:ring-2 focus:ring-blue-100
                placeholder-gray-400 text-gray-900"
              [class.border-red-400]="password?.invalid && password?.touched"
              [class.border-gray-300]="!(password?.invalid && password?.touched)"/>
            <button type="button" (click)="showPassword = !showPassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  [attr.d]="showPassword
                    ? 'M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21'
                    : 'M15 12a3 3 0 11-6 0 3 3 0 016 0z M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z'"/>
              </svg>
            </button>
          </div>
          @if (password?.invalid && password?.touched) {
            <p class="text-red-500 text-xs mt-1">Password is required</p>
          }
        </div>

        <!-- Submit -->
        <button type="submit" [disabled]="loading"
          class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-medium text-sm
            hover:bg-blue-700 transition-colors disabled:opacity-60 disabled:cursor-not-allowed
            flex items-center justify-center gap-2">
          @if (loading) {
            <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
            Signing in...
          } @else {
            Sign in
          }
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-gray-500 mt-6">
      Don't have an account?
      <a routerLink="/register" class="text-blue-600 font-medium hover:underline">Register here</a>
    </p>
  </div>
</div>
