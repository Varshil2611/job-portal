<div class="bg-gray-50 min-h-screen py-8">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-gray-900">Company Profile</h1>
      <p class="text-gray-500 text-sm mt-1">Update your company information</p>
    </div>

    @if (successMsg) {
      <div class="mb-4 p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm">
        {{ successMsg }}
      </div>
    }
    @if (errorMsg) {
      <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
        {{ errorMsg }}
      </div>
    }

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="md:col-span-2">
        <div class="bg-white rounded-xl border border-gray-200 p-6">
          <form [formGroup]="form" (ngSubmit)="onSave()" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">Your Name *</label>
              <input type="text" formControlName="name"
                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm outline-none focus:border-blue-500"/>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">Company Name *</label>
              <input type="text" formControlName="companyName"
                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm outline-none focus:border-blue-500"/>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">Website</label>
              <input type="url" formControlName="companyWebsite" placeholder="https://..."
                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm outline-none focus:border-blue-500"/>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Industry</label>
                <input type="text" formControlName="companyIndustry" placeholder="e.g. Technology"
                  class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm outline-none focus:border-blue-500"/>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Company Size</label>
                <select formControlName="companySize"
                  class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm outline-none focus:border-blue-500 bg-white">
                  <option value="">Select size</option>
                  @for (size of companySizes; track size) {
                    <option [value]="size">{{ size }}</option>
                  }
                </select>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
              <textarea formControlName="companyDescription" rows="3"
                placeholder="Tell candidates about your company..."
                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm outline-none focus:border-blue-500 resize-none"></textarea>
            </div>
            <button type="submit" [disabled]="saving"
              class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-medium text-sm
                hover:bg-blue-700 transition-colors disabled:opacity-60
                flex items-center justify-center gap-2">
              @if (saving) {
                <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                </svg>
                Saving...
              } @else {
                Save Profile
              }
            </button>
          </form>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-200 p-5 h-fit">
        <h2 class="font-semibold text-gray-900 mb-4">Company Logo</h2>
        <div class="flex justify-center mb-4">
          <div class="w-20 h-20 bg-blue-100 rounded-xl flex items-center justify-center text-blue-700 font-bold text-2xl">
            {{ authStore.user()?.company?.name?.charAt(0) || 'C' }}
          </div>
        </div>
        <label class="block cursor-pointer">
          <div class="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center hover:border-blue-400 transition-colors">
            @if (uploading) {
              <svg class="animate-spin w-6 h-6 text-blue-600 mx-auto" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
            } @else {
              <p class="text-sm text-gray-500">Upload logo</p>
              <p class="text-xs text-gray-400 mt-1">JPG, PNG max 2MB</p>
            }
          </div>
          <input type="file" accept="image/*" class="hidden" (change)="onLogoUpload($event)"/>
        </label>
      </div>
    </div>
  </div>
</div>
